# ============================================================
# alpaca_scanner.config.ini
# Configuration for the Alpaca Options Breakout Momentum Scanner
# All scanner parameters are controlled from this file.
# ============================================================

[telegram]
# Telegram bot token (from BotFather)
bot_token = 8636239659:AAFh3KY7DYTDy4lLmwam6mnZR0LS3lSEJgE

# Target chat/group ID (use negative IDs for groups)
chat_id = -1003713246101

# Send a summary Telegram message after each scan cycle
enabled = true

# Also send a "no signals" message when scan finds nothing
send_empty_alerts = false

# Maximum signals to include per Telegram message (avoids 4096-char limit)
max_signals_per_message = 20

[scheduler]
# Run the scanner every N minutes during market hours
interval_minutes = 1

# Only run during these EST hours (will skip outside market hours)
scheduler_start_time = 09:30
scheduler_stop_time  = 23:00

# Set to true to run once immediately on startup before first interval
run_on_start = true

[api]
# Alpaca credentials — values are read DIRECTLY from this config file
# Use https://api.alpaca.markets for live, https://paper-api.alpaca.markets for paper
api_key    = AKPWGHJO7P7LHT3HQ5VSWJAFI7
secret_key = 3MAMWHhfU9pbExaHsZmBNWSdy87ZnfLt8SSFB8pzsHfc
base_url   = https://api.alpaca.markets

[symbols]
# --- Priority symbols scanned FIRST (cleanest breakout structure, higher win rate)
priority_symbols = AMD, INTC

# --- Full watchlist scanned after priority symbols
watchlist = SPY, QQQ, AAPL, MSFT, NVDA, TSLA, META, AMZN, GOOGL, SNDK, MU, AVGO, ARM, QCOM, MRVL

[scan_window]
# Breakout scan window (EST). Earliest proven signal was at 11:40 AM Day 1.
# Focus on first 2 hours of market open.
scan_start_time = 09:30
scan_end_time   = 11:45

# Full market hours (used for peak/4PM price tracking only, not for signal generation)
market_open  = 09:30
market_close = 16:00

[date_range]
# Number of calendar days to look back for signals
lookback_days = 5

# Extra padding days before start to build EMA history
ema_warmup_days = 5

[ema]
# EMA spans for the underlying stock (5-min bars)
ema_fast_span   = 8
ema_slow_span   = 200

[atr]
# ATR period (number of bars) for momentum bar detection
atr_period = 14

# A bar qualifies as an "ATR momentum bar" if its range >= this multiplier × ATR
atr_momentum_multiplier = 1.0

[volume]
# Minimum cumulative option contract volume for the scan period (filter weak names)
min_option_volume = 3000

# Volume "surge" threshold: bar volume must be >= this multiple of the rolling avg volume
# for the "+1 volume surge" conviction score component
volume_surge_multiplier = 2.0

# Rolling window (bars) used to compute avg volume for surge detection
volume_avg_window = 20

[breakout]
# Breakout trigger: price must close ABOVE the prior trading day's high
# Set to true to enable the "prior day high breakout" condition (Score +1)
enable_prior_day_high_breakout = true

# ATR momentum bar check: bar range >= atr_momentum_multiplier × ATR (Score +1)
enable_atr_momentum_check = true

# Volume surge check: bar volume >= volume_surge_multiplier × avg volume (Score +1)
enable_volume_surge_check = true

[scoring]
# Minimum conviction score required to emit a signal (max possible = 3)
#   +1  Price closed above prior day high  (breakout)
#   +1  ATR momentum bar (strong range bar)
#   +1  Volume surge (2x avg volume)
min_score = 2

[options]
# Options expiry window: look for contracts expiring within this many calendar days
expiry_window_days = 14

# Strike selection rule (NEVER deep ITM):
#   CALL → lowest strike >= current price  (ATM or next OTM above)
#   PUT  → highest strike <= current price (ATM or next OTM below)
#
# otm_strikes: how many additional OTM strikes beyond ATM to also scan
#   0 = ATM only (default, highest liquidity)
#   1 = ATM + 1 strike further OTM
#   2 = ATM + 2 strikes further OTM
otm_strikes = 0

[output]
# Output Excel file name (saved to the working directory)
output_file = Alpaca_Options_Scanner_Results.xlsx

# Append run timestamp to Excel filename to keep per-run history
timestamp_output = false
